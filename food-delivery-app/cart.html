<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Review your cart items and proceed to checkout on Yummy.">
    <title>Cart — Yummy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">

    <style>
        .cart-layout {
            display: grid;
            grid-template-columns: 1.6fr 1fr;
            gap: 32px;
            align-items: start;
        }

        .bill-card {
            background: var(--bg-card);
            border-radius: var(--border-radius-lg);
            padding: var(--space-7);
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-color);
            position: sticky;
            top: 88px;
        }

        .bill-card h3 {
            font-family: var(--font-heading);
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: var(--space-5);
            color: var(--text-cream);
        }

        .bill-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-4);
            color: var(--text-muted);
            font-size: 0.92rem;
        }

        .bill-row strong {
            color: var(--text-cream);
            font-weight: 600;
        }

        .bill-row.border-bottom {
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: var(--space-4);
        }

        .bill-row.total {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--accent-gold);
            margin-bottom: var(--space-6);
        }

        .bill-row.total strong {
            font-weight: 800;
            color: var(--accent-gold);
        }

        @media (max-width: 768px) {
            .cart-layout {
                grid-template-columns: 1fr;
                gap: 24px;
            }
            .bill-card {
                position: static;
            }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo-link">
                <div class="logo">Yummy</div>
            </a>
            <div class="hamburger" onclick="this.classList.toggle('active'); document.querySelector('.nav-links').classList.toggle('show')">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i> Home</a></li>
                <li><a href="restaurants.html" class="nav-link"><i class="fa-solid fa-utensils"></i> Restaurants</a></li>
                <li><a href="offers.html" class="nav-link"><i class="fa-solid fa-percent"></i> Offers</a></li>
                <li><a href="login.html" id="login-link" class="nav-link"><i class="fa-solid fa-user"></i> Login</a></li>
                <li>
                    <a href="cart.html" class="nav-link active">
                        <div class="cart-icon-wrapper">
                            <i class="fa-solid fa-cart-shopping"></i>
                            <span class="cart-badge hidden" id="cart-badge">0</span>
                        </div>
                        <span>Cart</span>
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <section class="container page-fade-in" style="padding-top: 16px;">
            <h1 class="section-title">Your Cart</h1>
            
            <div class="cart-layout" id="cart-layout">
                <div id="cart-items-container">
                    <!-- Javascript will render cart items here -->
                </div>
                
                <div class="bill-card" id="cart-summary">
                    <h3>Bill Details</h3>
                    <div class="bill-row">
                        <span>Item Total</span>
                        <strong id="cart-subtotal">₹0</strong>
                    </div>
                    <div class="bill-row border-bottom">
                        <span>Delivery Fee</span>
                        <strong>₹40</strong>
                    </div>
                    <div class="bill-row total">
                        <span>To Pay</span>
                        <strong>Proceed to see</strong>
                    </div>
                    
                    <a href="checkout.html" class="btn btn-primary btn-block glow" style="padding: 15px;">
                        <i class="fa-solid fa-lock"></i> Checkout
                    </a>
                </div>
            </div>
        </section>
    </main>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/cart.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cartLayout = document.getElementById('cart-layout');
            const cartItems = JSON.parse(localStorage.getItem('cart')) || [];
            if(cartItems.length === 0 && cartLayout) {
                cartLayout.style.display = 'block';
                document.getElementById('cart-summary').style.display = 'none';
            }
        });
    </script>
</body>
</html>
