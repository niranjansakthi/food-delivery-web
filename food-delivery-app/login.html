<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Login or sign up to Yummy premium food delivery. Manage your orders and enjoy exclusive deals.">
    <title>Login — Yummy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>

    <nav class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo-link">
                <div class="logo">Yummy</div>
            </a>
            <div class="hamburger" onclick="this.classList.toggle('active'); document.querySelector('.nav-links').classList.toggle('show')">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-link"><i class="fa-solid fa-house"></i> Home</a></li>
                <li><a href="restaurants.html" class="nav-link"><i class="fa-solid fa-utensils"></i> Restaurants</a></li>
                <li><a href="offers.html" class="nav-link"><i class="fa-solid fa-percent"></i> Offers</a></li>
                <li><a href="login.html" id="login-link" class="nav-link active"><i class="fa-solid fa-user"></i> Login</a></li>
                <li>
                    <a href="cart.html" class="nav-link">
                        <div class="cart-icon-wrapper">
                            <i class="fa-solid fa-cart-shopping"></i>
                            <span class="cart-badge hidden" id="cart-badge">0</span>
                        </div>
                        <span>Cart</span>
                    </a>
                </li>
            </ul>
        </div>
    </nav>

    <main class="page-fade-in">
        <div class="container">
            
            <!-- Login Section -->
            <div class="auth-container" id="login-section">
                <div class="auth-header">
                    <h2>Welcome Back</h2>
                    <p>Sign in to your account</p>
                </div>
                
                <form id="login-form">
                    <div class="form-group">
                        <label class="form-label">Email address</label>
                        <input type="email" id="login-email" class="form-control" placeholder="you@example.com" required autofocus>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="login-password" class="form-control" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" style="padding: 15px;">Login</button>
                    
                    <div class="auth-switch">
                        Don't have an account? <a href="#" id="show-register">Create an account</a>
                    </div>
                </form>
            </div>
            
            <!-- Register Section -->
            <div class="auth-container hidden" id="register-section">
                <div class="auth-header">
                    <h2>Create Account</h2>
                    <p>Join Yummy and start ordering</p>
                </div>
                
                <form id="register-form">
                    <div class="form-group">
                        <label class="form-label">Full name</label>
                        <input type="text" id="register-name" class="form-control" placeholder="Your full name" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email address</label>
                        <input type="email" id="register-email" class="form-control" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="register-password" class="form-control" placeholder="Min. 6 characters" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-primary btn-block" style="padding: 15px;">Continue</button>
                    
                    <div class="auth-switch">
                        Already have an account? <a href="#" id="show-login">Login</a>
                    </div>
                </form>
            </div>

        </div>
    </main>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Scripts -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
